services:
  erpnext-db:
    image: mariadb:11.8
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    expose:
      - 3306/tcp
    networks:
      - default
    restart: unless-stopped
    volumes:
      - ./db:/var/lib/mysql
    healthcheck:
      test:
        - CMD
        - healthcheck.sh
        - --connect
        - --innodb_initialized
      start_period: 10s
      interval: 5s
      timeout: 5s
      retries: 10

  erpnext-redis-cache:
    image: redis:6.2-alpine
    expose:
      - 6379/tcp
    networks:
      - default
    restart: unless-stopped
    volumes:
      - ./redis-cache:/data

  erpnext-redis-queue:
    image: redis:6.2-alpine
    expose:
      - 6379/tcp
    networks:
      - default
    restart: unless-stopped
    volumes:
      - ./redis-queue:/data

  erpnext-configurator:
    image: frappe/erpnext:v16.22.0
    entrypoint:
      - bash
    command:
      - /opt/erpnext/configure.sh
    environment:
      - DB_HOST=erpnext-db
      - DB_PORT=3306
      - REDIS_CACHE=erpnext-redis-cache:6379
      - REDIS_QUEUE=erpnext-redis-queue:6379
      - SOCKETIO_PORT=9000
    networks:
      - default
    restart: "no"
    depends_on:
      erpnext-db:
        condition: service_healthy
      erpnext-redis-cache:
        condition: service_started
      erpnext-redis-queue:
        condition: service_started
    volumes:
      - ./files/configure.sh:/opt/erpnext/configure.sh:ro
      - ./sites:/home/frappe/frappe-bench/sites
      - ./logs:/home/frappe/frappe-bench/logs

  erpnext-create-sites:
    image: frappe/erpnext:v16.22.0
    entrypoint:
      - bash
    command:
      - /opt/erpnext/create-sites.sh
    environment:
      DB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      INSTRUKT_AI_ADMIN_PASSWORD: ${INSTRUKT_AI_ADMIN_PASSWORD}
      SANDBOX_ADMIN_PASSWORD: ${SANDBOX_ADMIN_PASSWORD}
    networks:
      - default
    restart: "no"
    depends_on:
      erpnext-configurator:
        condition: service_completed_successfully
    volumes:
      - ./files/create-sites.sh:/opt/erpnext/create-sites.sh:ro
      - ./files/sites.json:/opt/erpnext/sites.json:ro
      - ./sites:/home/frappe/frappe-bench/sites
      - ./logs:/home/frappe/frappe-bench/logs

  erpnext-backend:
    image: frappe/erpnext:v16.22.0
    networks:
      - default
    restart: unless-stopped
    depends_on:
      erpnext-create-sites:
        condition: service_completed_successfully
    volumes:
      - ./sites:/home/frappe/frappe-bench/sites
      - ./logs:/home/frappe/frappe-bench/logs

  erpnext-websocket:
    image: frappe/erpnext:v16.22.0
    command:
      - node
      - /home/frappe/frappe-bench/apps/frappe/socketio.js
    networks:
      - default
    restart: unless-stopped
    depends_on:
      erpnext-create-sites:
        condition: service_completed_successfully
    volumes:
      - ./sites:/home/frappe/frappe-bench/sites
      - ./logs:/home/frappe/frappe-bench/logs

  erpnext-queue-long:
    image: frappe/erpnext:v16.22.0
    command:
      - bench
      - worker
      - --queue
      - long,default,short
    networks:
      - default
    restart: unless-stopped
    depends_on:
      erpnext-create-sites:
        condition: service_completed_successfully
    volumes:
      - ./sites:/home/frappe/frappe-bench/sites
      - ./logs:/home/frappe/frappe-bench/logs

  erpnext-queue-short:
    image: frappe/erpnext:v16.22.0
    command:
      - bench
      - worker
      - --queue
      - short,default
    networks:
      - default
    restart: unless-stopped
    depends_on:
      erpnext-create-sites:
        condition: service_completed_successfully
    volumes:
      - ./sites:/home/frappe/frappe-bench/sites
      - ./logs:/home/frappe/frappe-bench/logs

  erpnext-scheduler:
    image: frappe/erpnext:v16.22.0
    command:
      - bench
      - schedule
    networks:
      - default
    restart: unless-stopped
    depends_on:
      erpnext-create-sites:
        condition: service_completed_successfully
    volumes:
      - ./sites:/home/frappe/frappe-bench/sites
      - ./logs:/home/frappe/frappe-bench/logs

  erpnext-frontend:
    image: frappe/erpnext:v16.22.0
    command:
      - nginx-entrypoint.sh
    environment:
      - BACKEND=erpnext-backend:8000
      - FRAPPE_SITE_NAME_HEADER=$$host
      - HEALTHCHECK_SITE=instrukt-ai.erpnext.instrukt.ai
      - SOCKETIO=erpnext-websocket:9000
      - UPSTREAM_REAL_IP_ADDRESS=127.0.0.1
      - UPSTREAM_REAL_IP_HEADER=X-Forwarded-For
      - UPSTREAM_REAL_IP_RECURSIVE=off
      - PROXY_READ_TIMEOUT=120
      - CLIENT_MAX_BODY_SIZE=50m
    expose:
      - 8080/tcp
    networks:
      - default
    restart: unless-stopped
    depends_on:
      erpnext-backend:
        condition: service_started
      erpnext-websocket:
        condition: service_started
    volumes:
      - ./sites:/home/frappe/frappe-bench/sites
      - ./logs:/home/frappe/frappe-bench/logs
    healthcheck:
      test:
        - CMD-SHELL
        - 'curl -fsS -H "Host: $$HEALTHCHECK_SITE" http://localhost:8080/api/method/ping || exit 1'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
