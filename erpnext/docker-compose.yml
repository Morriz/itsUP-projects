services:
  erpnext-db:
    image: mariadb:11.8
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    expose:
      - 3306/tcp
    networks:
      - default
    restart: unless-stopped
    volumes:
      - ./db:/var/lib/mysql
    healthcheck:
      test:
        - CMD
        - healthcheck.sh
        - --connect
        - --innodb_initialized
      start_period: 10s
      interval: 5s
      timeout: 5s
      retries: 10

  erpnext-redis-cache:
    image: redis:6.2-alpine
    expose:
      - 6379/tcp
    networks:
      - default
    restart: unless-stopped
    volumes:
      - ./redis-cache:/data

  erpnext-redis-queue:
    image: redis:6.2-alpine
    expose:
      - 6379/tcp
    networks:
      - default
    restart: unless-stopped
    volumes:
      - ./redis-queue:/data

  erpnext-configurator:
    image: frappe/erpnext:v16.22.0
    entrypoint:
      - bash
      - -c
    command:
      - >
        [ -f sites/common_site_config.json ] || echo '{}' > sites/common_site_config.json;
        ls -1 apps > sites/apps.txt;
        bench set-config -g db_host $$DB_HOST;
        bench set-config -gp db_port $$DB_PORT;
        bench set-config -g redis_cache "redis://$$REDIS_CACHE";
        bench set-config -g redis_queue "redis://$$REDIS_QUEUE";
        bench set-config -g redis_socketio "redis://$$REDIS_QUEUE";
        bench set-config -gp socketio_port $$SOCKETIO_PORT;
    environment:
      - DB_HOST=erpnext-db
      - DB_PORT=3306
      - REDIS_CACHE=erpnext-redis-cache:6379
      - REDIS_QUEUE=erpnext-redis-queue:6379
      - SOCKETIO_PORT=9000
    networks:
      - default
    restart: "no"
    depends_on:
      erpnext-db:
        condition: service_healthy
      erpnext-redis-cache:
        condition: service_started
      erpnext-redis-queue:
        condition: service_started
    volumes:
      - ./sites:/home/frappe/frappe-bench/sites
      - ./logs:/home/frappe/frappe-bench/logs

  erpnext-create-sites:
    image: frappe/erpnext:v16.22.0
    entrypoint:
      - bash
      - -c
    command:
      - >
        set -euo pipefail;
        wait-for-it -t 120 erpnext-db:3306;
        wait-for-it -t 120 erpnext-redis-cache:6379;
        wait-for-it -t 120 erpnext-redis-queue:6379;
        export start=$$(date +%s);
        until [[ -n $$(grep -hs ^ sites/common_site_config.json | jq -r ".db_host // empty") ]] && \
          [[ -n $$(grep -hs ^ sites/common_site_config.json | jq -r ".redis_cache // empty") ]] && \
          [[ -n $$(grep -hs ^ sites/common_site_config.json | jq -r ".redis_queue // empty") ]];
        do
          echo "Waiting for sites/common_site_config.json to be created";
          sleep 5;
          if (( $$(date +%s)-start > 120 )); then
            echo "could not find sites/common_site_config.json with required keys";
            exit 1;
          fi;
        done;
        echo "sites/common_site_config.json found";
        SITE_COUNT=$$(jq -r "length" /opt/erpnext/sites.json);
        if (( SITE_COUNT < 1 )); then
          echo "sites.json must declare at least one site";
          exit 1;
        fi;
        jq -e '([.[].name] | length) == ([.[].name] | unique | length)' /opt/erpnext/sites.json >/dev/null;
        jq -c '.[]' /opt/erpnext/sites.json | while IFS= read -r site;
        do
          SITE_NAME=$$(echo "$$site" | jq -r ".name // empty");
          ADMIN_PASSWORD_ENV=$$(echo "$$site" | jq -r ".admin_password_env // empty");
          if [[ -z "$$SITE_NAME" ]] || [[ -z "$$ADMIN_PASSWORD_ENV" ]]; then
            echo "each sites.json entry requires name and admin_password_env";
            exit 1;
          fi;
          if [[ ! "$$ADMIN_PASSWORD_ENV" =~ ^[A-Z][A-Z0-9_]*$$ ]]; then
            echo "invalid admin password variable name for site '$$SITE_NAME'";
            exit 1;
          fi;
          ADMIN_PASSWORD=$$(printenv "$$ADMIN_PASSWORD_ENV" || true);
          if [[ -z "$$ADMIN_PASSWORD" ]]; then
            echo "missing admin password variable '$$ADMIN_PASSWORD_ENV' for site '$$SITE_NAME'";
            exit 1;
          fi;
          if [ -d "sites/$$SITE_NAME" ]; then
            echo "site '$$SITE_NAME' already exists - skipping create (idempotent re-apply)";
          else
            bench new-site --mariadb-user-host-login-scope='%' --admin-password="$$ADMIN_PASSWORD" --db-root-username=root --db-root-password="$$DB_ROOT_PASSWORD" --install-app erpnext "$$SITE_NAME";
          fi;
          bench --site "$$SITE_NAME" set-config host_name "https://$$SITE_NAME";
        done;
    environment:
      DB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      INSTRUKT_AI_ADMIN_PASSWORD: ${INSTRUKT_AI_ADMIN_PASSWORD}
      SANDBOX_ADMIN_PASSWORD: ${SANDBOX_ADMIN_PASSWORD}
    networks:
      - default
    restart: "no"
    depends_on:
      erpnext-configurator:
        condition: service_completed_successfully
    volumes:
      - ../../projects/erpnext/sites.json:/opt/erpnext/sites.json:ro
      - ./sites:/home/frappe/frappe-bench/sites
      - ./logs:/home/frappe/frappe-bench/logs

  erpnext-backend:
    image: frappe/erpnext:v16.22.0
    networks:
      - default
    restart: unless-stopped
    depends_on:
      erpnext-create-sites:
        condition: service_completed_successfully
    volumes:
      - ./sites:/home/frappe/frappe-bench/sites
      - ./logs:/home/frappe/frappe-bench/logs

  erpnext-websocket:
    image: frappe/erpnext:v16.22.0
    command:
      - node
      - /home/frappe/frappe-bench/apps/frappe/socketio.js
    networks:
      - default
    restart: unless-stopped
    depends_on:
      erpnext-create-sites:
        condition: service_completed_successfully
    volumes:
      - ./sites:/home/frappe/frappe-bench/sites
      - ./logs:/home/frappe/frappe-bench/logs

  erpnext-queue-long:
    image: frappe/erpnext:v16.22.0
    command:
      - bench
      - worker
      - --queue
      - long,default,short
    networks:
      - default
    restart: unless-stopped
    depends_on:
      erpnext-create-sites:
        condition: service_completed_successfully
    volumes:
      - ./sites:/home/frappe/frappe-bench/sites
      - ./logs:/home/frappe/frappe-bench/logs

  erpnext-queue-short:
    image: frappe/erpnext:v16.22.0
    command:
      - bench
      - worker
      - --queue
      - short,default
    networks:
      - default
    restart: unless-stopped
    depends_on:
      erpnext-create-sites:
        condition: service_completed_successfully
    volumes:
      - ./sites:/home/frappe/frappe-bench/sites
      - ./logs:/home/frappe/frappe-bench/logs

  erpnext-scheduler:
    image: frappe/erpnext:v16.22.0
    command:
      - bench
      - schedule
    networks:
      - default
    restart: unless-stopped
    depends_on:
      erpnext-create-sites:
        condition: service_completed_successfully
    volumes:
      - ./sites:/home/frappe/frappe-bench/sites
      - ./logs:/home/frappe/frappe-bench/logs

  erpnext-frontend:
    image: frappe/erpnext:v16.22.0
    command:
      - nginx-entrypoint.sh
    environment:
      - BACKEND=erpnext-backend:8000
      - FRAPPE_SITE_NAME_HEADER=$$host
      - HEALTHCHECK_SITE=instrukt-ai.erpnext.instrukt.ai
      - SOCKETIO=erpnext-websocket:9000
      - UPSTREAM_REAL_IP_ADDRESS=127.0.0.1
      - UPSTREAM_REAL_IP_HEADER=X-Forwarded-For
      - UPSTREAM_REAL_IP_RECURSIVE=off
      - PROXY_READ_TIMEOUT=120
      - CLIENT_MAX_BODY_SIZE=50m
    expose:
      - 8080/tcp
    networks:
      - default
    restart: unless-stopped
    depends_on:
      erpnext-backend:
        condition: service_started
      erpnext-websocket:
        condition: service_started
    volumes:
      - ./sites:/home/frappe/frappe-bench/sites
      - ./logs:/home/frappe/frappe-bench/logs
    healthcheck:
      test:
        - CMD-SHELL
        - 'curl -fsS -H "Host: $$HEALTHCHECK_SITE" http://localhost:8080/api/method/ping || exit 1'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
