log_dest stdout
log_type all

# --- Fan-facing listener (reached via Traefik SNI passthrough on .30:443) ---
listener 8883
allow_anonymous true
certfile /mosquitto/certs/collector3.cloudgarden.nl.crt
keyfile  /mosquitto/certs/collector3.cloudgarden.nl.key
require_certificate false
tls_version tlsv1.2

# --- Bridge OUT to HA Mosquitto (authenticated) ---
# All fan topics flow into the HA broker as an authenticated client, so HA's
# LouisR integration sees them on the HA broker exactly like any other source.
connection ha-bridge
address 192.168.1.74:8883
remote_username oki
remote_password d0ki
bridge_protocol_version mqttv311
# HA Mosquitto presents our self-signed collector3 cert; trust it explicitly.
bridge_cafile /mosquitto/certs/collector3.cloudgarden.nl.crt
bridge_insecure true
cleansession true
notifications false
try_private false
# Forward everything both directions (only the fan connects here anyway).
topic # out 0
topic # in 0
