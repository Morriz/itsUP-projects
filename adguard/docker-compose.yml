services:
  adguard-app:
    image: adguard/adguardhome
    # No host ports: host :53 is owned by the existing DNS container. AdGuard runs
    # only on proxynet (pinned to 172.20.0.252 via ingress). The honeypot forwards
    # to 172.20.0.252:53, and Traefik serves the web UI from 172.20.0.252:80.
    # Hardening: drop every Linux capability except binding low ports (53/80),
    # forbid privilege escalation, and run with a read-only root + tmpfs scratch.
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - ./work:/opt/adguardhome/work
      - ./conf:/opt/adguardhome/conf
