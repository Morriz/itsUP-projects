services:
  test-master:
    environment:
    - INFORMANT=${INFORMANT}
    - TARGET=cost concerned people
    expose:
    - 8080/tcp
    image: morriz/hello-world:main
    networks:
    - default
    restart: unless-stopped
    volumes:
    - ./data/bla:/data/bla
    - ./etc/dida:/etc/dida
    healthcheck:
      interval: 30s
      retries: 3
      start_period: 10s
      test:
      - CMD-SHELL
      - wget -q -O /dev/null http://localhost:8080/ || exit 1
      timeout: 5s
  test-informant:
    environment:
    - TARGET=${TARGET}
    - TESTIE=${TEST}
    expose:
    - 8080/tcp
    image: morriz/hello-world:main
    networks:
    - default
    restart: unless-stopped
    cpus: 0.1
    healthcheck:
      interval: 30s
      retries: 3
      start_period: 10s
      test:
      - CMD-SHELL
      - wget -q -O /dev/null http://localhost:8080/ || exit 1
      timeout: 5s
