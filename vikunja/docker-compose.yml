services:
  vikunja-db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    expose:
      - 5432/tcp
    networks:
      - default
    restart: unless-stopped
    volumes:
      - ./db:/var/lib/postgresql/data
    healthcheck:
      interval: 10s
      retries: 5
      test:
        - CMD-SHELL
        - pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB
      timeout: 5s
  vikunja-files-init:
    image: busybox:latest
    command: ["sh", "-c", "chgrp -R 0 /files && chmod -R g+rwX /files"]
    volumes:
      - ./files:/files
    networks:
      - default
  vikunja-app:
    depends_on:
      vikunja-db:
        condition: service_healthy
      vikunja-files-init:
        condition: service_completed_successfully
    environment:
      - VIKUNJA_SERVICE_PUBLICURL=https://vikunja.instrukt.ai/
      - VIKUNJA_SERVICE_SECRET=${VIKUNJA_SERVICE_SECRET}
      - VIKUNJA_DATABASE_TYPE=postgres
      - VIKUNJA_DATABASE_HOST=vikunja-db
      - VIKUNJA_DATABASE_DATABASE=${POSTGRES_DB}
      - VIKUNJA_DATABASE_USER=${POSTGRES_USER}
      - VIKUNJA_DATABASE_PASSWORD=${POSTGRES_PASSWORD}
    expose:
      - 3456/tcp
    image: vikunja/vikunja:latest
    user: "1000:0"
    networks:
      - default
    restart: unless-stopped
    volumes:
      - ./files:/app/vikunja/files
    healthcheck:
      interval: 15s
      retries: 3
      start_period: 30s
      test:
        - CMD
        - /app/vikunja/vikunja
        - healthcheck
      timeout: 15s
